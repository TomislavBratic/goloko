spring.application.name=goloko
spring.datasource.url=jdbc:mariadb://db:3306/goloko
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

#For docker health check purposes
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always


spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.trigger-file=.restart
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
spring.devtools.livereload.enabled=true


# Flyway Configuration
spring.flyway.enabled=true
flyway.databaseType=mariadb
#to recognize existing database
spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:mariadb://db:3306/goloko
spring.flyway.user=root
spring.flyway.password=root
#path to migrations
spring.flyway.locations=classpath:db/migration

spring.flyway.connectRetries=10
spring.flyway.clean-on-validation-error=true
spring.flyway.validate-on-migrate=true



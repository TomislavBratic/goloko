spring.datasource.url=jdbc:mariadb://localhost:3306/goloko
spring.datasource.username=root
spring.datasource.password=root

# Actuator (ok for local)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Devtools
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.trigger-file=.restart
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
spring.devtools.livereload.enabled=true

# Flyway
spring.flyway.connect-retries=10
spring.flyway.clean-on-validation-error=false
# Enable ONLY if attaching Flyway to an existing schema that was not managed before
# spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG